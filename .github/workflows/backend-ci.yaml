name: Backend CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'

jobs:
  test:
    name: Django Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: APPWRITE_INTEGRATION_TESTS=false python manage.py test --verbosity=1
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-test-secret-key
          DEBUG: 'false'
